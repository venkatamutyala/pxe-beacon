# Example Debian preseed.cfg for use with pxe-beacon.
#
# pxe-beacon Go-templates this file at serve time. Available vars:
#   {{.Name}}          machine display name from fleet.yaml
#   {{.MAC}}           canonical colon-MAC
#   {{.MACHyp}}        hyphen-MAC
#   {{.AdvertisedIP}}  pxe-beacon server IP
#   {{.HTTPPort}}      pxe-beacon HTTP port
#
# Tweak everything in this file to match your fleet's policy:
#   - root password / user account / SSH keys
#   - disk layout / partitioning
#   - package selection
#   - locale / keyboard / timezone
#
# When fleet.yaml has BOTH `preseed:` and `cloud_init:` for a
# machine, pxe-beacon appends a late_command bridge to the preseed
# that installs cloud-init on the target and seeds your cloud-init
# user-data into /var/lib/cloud/seed/nocloud/. cloud-init then runs
# on first boot of the installed system. You don't need to do
# anything extra for the bridge — pxe-beacon adds it automatically.

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string {{.Name}}
d-i netcfg/get_domain string local

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Account setup — REPLACE these defaults with secure values for your fleet.
# This default password is INTENTIONALLY weak so you'll notice it. Generate
# a real one with: mkpasswd -m sha-512
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string pxe-beacon
d-i passwd/username string ops
d-i passwd/user-password-crypted password $6$saltsalt$REPLACE_ME_WITH_REAL_HASH_OR_USE_BRIDGE
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

### Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

### Partitioning — atomic / single-partition guided install.
# Works on /dev/sda, /dev/vda (virtio), or /dev/nvme0n1 — whichever
# is the first/only disk. Adjust to your hardware reality.
d-i partman-auto/disk string /dev/sda /dev/vda /dev/nvme0n1
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Base + packages
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server ca-certificates wget curl
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Finish — no prompt, just reboot
d-i finish-install/reboot_in_progress note
