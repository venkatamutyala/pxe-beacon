#cloud-config
# Debian 12 example. Same template vars as the Ubuntu example.
hostname: {{.Name}}
fqdn: {{.Name}}.lab.local

users:
  - name: ops
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - "ssh-ed25519 AAAAC3N... ops@laptop"

packages:
  - postgresql-15
  - vim
  - curl

# Do NOT add a phone_home here — pxe-beacon appends its own tokenized
# phone_home to every served cloud-init (it owns the callback). Defining
# your own makes fleet load fail.
