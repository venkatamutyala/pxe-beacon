#cloud-config
# Example cloud-init user-data for an Ubuntu kube node.
# Templated by pxe-beacon at request time — vars available:
#   {{.Name}}          machine name from fleet.yaml
#   {{.MAC}}           canonical colon-MAC
#   {{.MACHyp}}        hyphen-MAC (for URL paths)
#   {{.AdvertisedIP}}  pxe-beacon server IP
#   {{.HTTPPort}}      pxe-beacon HTTP port

autoinstall:
  version: 1

  identity:
    hostname: {{.Name}}
    username: ops
    # Replace this hash. Generate with: mkpasswd --method=SHA-512 --rounds=4096
    password: "$6$saltsalt$REPLACE_THIS_WITH_A_REAL_HASH"

  ssh:
    install-server: true
    authorized-keys:
      - "ssh-ed25519 AAAAC3N... ops@laptop"   # replace with your key

  packages:
    - curl
    - ca-certificates
    - vim
    - containerd

  late-commands:
    - curtin in-target -- systemctl enable containerd

  # On install failure, ship the installer logs to pxe-beacon so the
  # failure is visible at GET /api/v1/machines/{mac}/logs. Best-effort.
  error-commands:
    - 'curl -fsS -X POST --data-binary @/var/log/installer/subiquity-server-debug.log "http://{{.AdvertisedIP}}:{{.HTTPPort}}/autoinstall/{{.MACHyp}}/log{{if .CallbackToken}}?t={{.CallbackToken}}{{end}}" || true'

# Do NOT add a phone_home here — pxe-beacon appends its own tokenized
# phone_home to every served cloud-init (it owns the callback). Defining
# your own makes fleet load fail.
