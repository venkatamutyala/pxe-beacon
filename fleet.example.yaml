# pxe-beacon fleet configuration — example.
#
# Run: sudo ./pxe-beacon -config ./fleet.example.yaml
# Then drop one of these MACs onto your LAN, power-cycle it, and watch
# http://<advertised-ip>:8080/status in a browser.
#
# Reload without restarting: edit this file, then `kill -HUP <pid>`.

# Behavior for any MAC that isn't listed below.
defaults:
  boot: menu   # netboot.xyz interactive menu (the v0.1.3 default)

# Per-machine boot profile.
# `boot:` is one of: menu, ubuntu-22.04, ubuntu-24.04, debian-12, custom
# `cloud_init:` is required for the ubuntu/debian autoinstall targets.
# Relative paths are resolved from this file's directory.
machines:
  - mac: 58:47:ca:70:c7:c9
    name: db-primary
    boot: debian-12
    # Debian needs preseed.cfg for unattended install (d-i doesn't read
    # cloud-init / NoCloud). cloud_init is OPTIONAL — when both are set,
    # pxe-beacon appends a late_command to the preseed that installs
    # cloud-init on the target and seeds it with your user-data so it
    # runs on first boot of the installed system. See
    # examples/debian-preseed.cfg for a starting template.
    preseed: ./examples/debian-preseed.cfg
    cloud_init: ./examples/debian-db.yaml

  - mac: aa:bb:cc:dd:ee:01
    name: kube-2
    boot: ubuntu-22.04
    cloud_init: ./examples/kube-node.yaml

  - mac: aa:bb:cc:dd:ee:02
    name: db-primary
    boot: debian-12
    # Debian needs preseed.cfg for unattended install (d-i doesn't read
    # cloud-init / NoCloud). cloud_init is OPTIONAL — when both are set,
    # pxe-beacon appends a late_command to the preseed that installs
    # cloud-init on the target and seeds it with your user-data so it
    # runs on first boot of the installed system. See
    # examples/debian-preseed.cfg for a starting template.
    preseed: ./examples/debian-preseed.cfg
    cloud_init: ./examples/debian-db.yaml

  - mac: bb:cc:dd:ee:ff:00
    name: db-secondary
    boot: debian-13                       # Trixie — same preseed contract
    preseed: ./examples/debian-preseed.cfg
    cloud_init: ./examples/debian-db.yaml

  - mac: 11:22:33:44:55:66
    name: rescue-jumpbox
    boot: custom
    ipxe_script: ./examples/rescue.ipxe
