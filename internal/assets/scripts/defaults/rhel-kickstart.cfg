# pxe-beacon EMBEDDED DEFAULT kickstart.cfg
#
# Used when a rocky-9 / alma-9 fleet entry omits the `kickstart:`
# field. Provides a minimum-viable unattended install for the
# RHEL-family clones so operators can verify the boot chain
# without writing a kickstart first.
#
# *** SECURITY: the default user is `pxe` / password `pxe`. This is
# *** INTENTIONALLY weak — it exists so the boot works out of the
# *** box. For anything other than a throwaway test machine, write
# *** your own kickstart and reference it via `kickstart: ./your.cfg`
# *** in fleet.yaml, or edit this template via the /admin UI.
#
# pxe-beacon Go-templates this file. Vars: Name, MAC, MACHyp,
# AdvertisedIP, HTTPPort, ClientNetmask, WiderNetworkCIDR, RepoBaseURL,
# CallbackToken.

### Installation source (overridden at boot via inst.repo= cmdline)
url --url={{.RepoBaseURL}}

### Additional repos — AppStream is required on RHEL 9-family
repo --name=AppStream --baseurl={{.RepoBaseURL | replace "BaseOS" "AppStream"}}

### Localization
lang en_US.UTF-8
keyboard us
timezone UTC --utc

### Network — by default DHCP, hostname from fleet name.
### Anaconda re-DHCPs from scratch after kernel handoff, so the
### widened netmask iPXE used doesn't carry over. We pass ip=...
### via inst.ks= cmdline (see dispatch.go) and let Anaconda apply.
network --bootproto=dhcp --hostname={{.Name}} --activate

### Account setup — DEFAULT IS INSECURE (pxe / pxe). Replace by
### providing a custom kickstart via fleet.yaml's `kickstart:` field
### or overriding via the /admin UI.
rootpw --plaintext pxe
user --name=pxe --password=pxe --plaintext --groups=wheel
sshpw --username=pxe --plaintext pxe

### Disk partitioning — pick the first non-removable disk ≥ 8GB.
### Anaconda's `ignoredisk --only-use` doesn't support dynamic
### selection in declarative form; we use `clearpart --all` + auto.
### Operators with multiple disks should override this kickstart.
clearpart --all --initlabel
autopart --type=lvm --noboot --nohome

### Bootloader — install to MBR/EFI on the first disk.
bootloader --location=mbr --boot-drive=$(/usr/sbin/lsblk -dn -o NAME,SIZE,RM,TYPE | awk '$3=="0" && $4=="disk" && $2 ~ /^[0-9.]+G/ && $2+0 >= 8 {print "/dev/"$1; exit}')

### Package selection — minimal install + cloud-init + ssh + curl
%packages
@^minimal-environment
@core
cloud-init
openssh-server
curl
wget
ca-certificates
-iwl*-firmware
%end

### Don't reboot, just shutdown — gives operator a chance to
### power-cycle into the installed system manually if needed.
### Change to `reboot` for fully unattended.
reboot

### Pre-install (runs in the installer environment before partitioning)
%pre --erroronfail
echo "pxe-beacon: starting Rocky/Alma 9 install for {{.Name}} ({{.MAC}})"
echo "pxe-beacon: cmdline kernel netmask widening = {{.ClientNetmask}}"
%end

### Post-install (runs in /target after package install,
### before reboot). This is where we seed cloud-init for first-boot
### config + (if -client-netmask is set) install a link-scope route
### so cloud-init phone_home can reach pxe-beacon.
%post --erroronfail --log=/root/pxe-beacon-post.log

# Seed cloud-init via NoCloud datasource. The user-data is the
# minimum needed to confirm the install via phone_home — operators
# extend this by providing their own kickstart or templating into
# fleet.yaml's cloud_init: field.
mkdir -p /var/lib/cloud/seed/nocloud
cat > /var/lib/cloud/seed/nocloud/meta-data <<EOF
instance-id: pxe-beacon-{{.MACHyp}}
local-hostname: {{.Name}}
EOF

cat > /var/lib/cloud/seed/nocloud/user-data <<EOF
#cloud-config
hostname: {{.Name}}
manage_etc_hosts: true
phone_home:
  url: http://{{.AdvertisedIP}}:{{.HTTPPort}}/autoinstall/{{.MACHyp}}/done{{if .CallbackToken}}?t={{.CallbackToken}}{{end}}
  post: all
EOF

# Pin datasource so cloud-init doesn't waste 120s probing Ec2/Azure/GCP
mkdir -p /etc/cloud/cloud.cfg.d
echo 'datasource_list: [NoCloud, None]' > /etc/cloud/cloud.cfg.d/90-pxe-beacon-nocloud.cfg

{{- if .WiderNetworkCIDR }}
# v0.6.0: link-scope route to {{.WiderNetworkCIDR}} so cloud-init
# phone_home + future fleet-manager traffic can reach pxe-beacon
# even when this box's DHCP-supplied netmask is narrower than the
# actual L2 broadcast domain.
cat > /usr/local/sbin/pxe-beacon-route <<'EOSCRIPT'
#!/bin/sh
set -e
IFACE=$(ip -o -4 route show default | awk '{print $5; exit}')
[ -n "$IFACE" ] || exit 0
ip route replace {{.WiderNetworkCIDR}} dev "$IFACE" scope link 2>/dev/null || true
EOSCRIPT
chmod 755 /usr/local/sbin/pxe-beacon-route

cat > /etc/systemd/system/pxe-beacon-route.service <<'EOUNIT'
[Unit]
Description=pxe-beacon link-scope route to {{.WiderNetworkCIDR}}
After=network-online.target
Wants=network-online.target

[Service]
Type=oneshot
ExecStart=/usr/local/sbin/pxe-beacon-route
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
EOUNIT
systemctl enable pxe-beacon-route.service
{{- end }}

echo "pxe-beacon: post-install complete for {{.Name}}"
%end

### On fatal install error, ship Anaconda logs + dmesg to pxe-beacon so
### the failure is visible at GET /api/v1/machines/{mac}/logs. Best-effort
### (runs in the installer env; curl may or may not be present).
%onerror --erroronfail
LOGURL="http://{{.AdvertisedIP}}:{{.HTTPPort}}/autoinstall/{{.MACHyp}}/log{{if .CallbackToken}}?t={{.CallbackToken}}{{end}}"
{ echo "=== dmesg ==="; dmesg 2>/dev/null; echo "=== anaconda ==="; cat /tmp/*.log /tmp/anaconda.log 2>/dev/null; } > /tmp/pxe-beacon-fail.log 2>&1
curl -fsS -X POST --data-binary @/tmp/pxe-beacon-fail.log "$LOGURL" 2>/dev/null \
  || wget -q -O /dev/null --post-file=/tmp/pxe-beacon-fail.log "$LOGURL" 2>/dev/null \
  || true
%end
