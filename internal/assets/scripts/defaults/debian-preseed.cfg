# pxe-beacon EMBEDDED DEFAULT preseed.cfg
#
# v0.6.14: rewritten to mirror venkatamutyala/debian-preseed/preseed-nvm.cfg
# (a known-good real-world preseed that has actually completed installs on
# the user's hardware). The previous v0.6.8 rewrite kept too much of the
# "harden everything" surface from earlier iterations; this one strips
# back to a minimum-viable working preseed.
#
# Differences from the reference:
#   - User account: pxe-beacon ships with `pxe / pxe` (no root pw)
#     instead of root-only. Operators who want different credentials
#     should provide their own preseed via fleet.yaml's `preseed:` field
#     or override this template via /admin.
#   - Mirror: deb.debian.org (httpredir is deprecated, redirects here).
#   - Disk: tries nvme0n1 / sda / vda / hda in order. The reference
#     hardcodes nvme0n1 because the user's hardware is known NVMe;
#     the embedded default needs to work across more boards.
#   - cloud-init: installed so pxe-beacon's /status can phone home.
#   - Cross-subnet route helper: late_command writes a systemd
#     one-shot when -client-netmask is set, so the installed system
#     can route back to pxe-beacon's IP that lives across a /24
#     boundary.
#
# pxe-beacon Go-templates this file. Vars: Name, MAC, MACHyp,
# AdvertisedIP, HTTPPort, WiderNetworkCIDR.
#
# *** SECURITY: the default user is `pxe` / password `pxe`. This is
# *** INTENTIONALLY weak — it exists so the boot works out of the
# *** box. For anything other than a throwaway test machine, write
# *** your own preseed.

### Locale
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network — DHCP only. d-i's netcfg picks the interface it sees
### come up first (the wired one PXE booted from, via BOOTIF on the
### kernel cmdline). No static IP overrides — the kernel ip=dhcp
### cmdline brings the link up, d-i trusts the result.
d-i netcfg/choose_interface select auto
d-i netcfg/choose_interface seen true
d-i netcfg/get_hostname string {{.Name}}
d-i netcfg/get_hostname seen true
d-i netcfg/get_domain string local
d-i netcfg/get_domain seen true

### Account — DEFAULT IS INSECURE (pxe / pxe). Override via custom preseed.
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string pxe-beacon default
d-i passwd/username string pxe
d-i passwd/user-password password pxe
d-i passwd/user-password-again password pxe
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

### Clock
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true

### Disk — try NVMe first, then SATA, then virtio, then IDE. POSIX
### test (busybox in d-i may not have lsblk). Operators with
### multi-disk setups should write their own preseed.
d-i partman/early_command string \
  for d in /dev/nvme0n1 /dev/sda /dev/vda /dev/hda; do \
    if [ -b "$d" ]; then \
      debconf-set partman-auto/disk "$d"; \
      debconf-set grub-installer/bootdev "$d"; \
      break; \
    fi; \
  done

d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Mirror (HTTP not HTTPS — snponly iPXE's CA + clock are unreliable;
### d-i loads its own apt config later).
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Packages — standard task + the minimum for cloud-init phone-home.
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server cloud-init sudo curl ca-certificates
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

### Finish
d-i finish-install/reboot_in_progress note

{{- if .WiderNetworkCIDR }}
### Cross-/24 route helper — installed when pxe-beacon is started
### with -client-netmask. Adds a link-scope route to {{.WiderNetworkCIDR}}
### so the installed system's cloud-init phone_home back to
### {{.AdvertisedIP}} doesn't try to route through the gateway.
d-i preseed/late_command string \
  echo "#!/bin/sh" > /target/usr/local/sbin/pxe-beacon-route; \
  echo "set -e" >> /target/usr/local/sbin/pxe-beacon-route; \
  echo "IFACE=\$(ip -o -4 route show default | awk '{print \$5; exit}')" >> /target/usr/local/sbin/pxe-beacon-route; \
  echo "[ -n \"\$IFACE\" ] || exit 0" >> /target/usr/local/sbin/pxe-beacon-route; \
  echo "ip route replace {{.WiderNetworkCIDR}} dev \"\$IFACE\" scope link 2>/dev/null || true" >> /target/usr/local/sbin/pxe-beacon-route; \
  chmod 755 /target/usr/local/sbin/pxe-beacon-route; \
  echo "[Unit]" > /target/etc/systemd/system/pxe-beacon-route.service; \
  echo "Description=pxe-beacon link-scope route to {{.WiderNetworkCIDR}}" >> /target/etc/systemd/system/pxe-beacon-route.service; \
  echo "After=network-online.target" >> /target/etc/systemd/system/pxe-beacon-route.service; \
  echo "Wants=network-online.target" >> /target/etc/systemd/system/pxe-beacon-route.service; \
  echo "[Service]" >> /target/etc/systemd/system/pxe-beacon-route.service; \
  echo "Type=oneshot" >> /target/etc/systemd/system/pxe-beacon-route.service; \
  echo "ExecStart=/usr/local/sbin/pxe-beacon-route" >> /target/etc/systemd/system/pxe-beacon-route.service; \
  echo "RemainAfterExit=yes" >> /target/etc/systemd/system/pxe-beacon-route.service; \
  echo "[Install]" >> /target/etc/systemd/system/pxe-beacon-route.service; \
  echo "WantedBy=multi-user.target" >> /target/etc/systemd/system/pxe-beacon-route.service; \
  in-target systemctl enable pxe-beacon-route.service
{{- end }}
