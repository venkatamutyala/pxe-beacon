# pxe-beacon EMBEDDED DEFAULT preseed.cfg
#
# Used when a debian-12 / debian-13 fleet entry omits the `preseed:`
# field. Provides a minimum-viable unattended install so operators
# can verify the boot chain without writing a preseed first.
#
# *** SECURITY: the default user is `pxe` / password `pxe`. This is
# *** INTENTIONALLY weak — it exists so the boot works out of the
# *** box. For anything other than a throwaway test machine, write
# *** your own preseed and reference it via `preseed: ./your.cfg`
# *** in fleet.yaml, or edit this template via the /admin UI.
#
# pxe-beacon Go-templates this file. Vars: Name, MAC, MACHyp,
# AdvertisedIP, HTTPPort.

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i localechooser/supported-locales multiselect en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string {{.Name}}
d-i netcfg/get_domain string local
d-i netcfg/hostname string {{.Name}}

### Mirror — HTTP not HTTPS (snponly iPXE's CA + clock are unreliable;
### d-i loads its own apt config later)
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string bookworm

### Account setup — DEFAULT IS INSECURE (pxe / pxe). Replace by
### providing a custom preseed via fleet.yaml's `preseed:` field or
### overriding via the /admin UI.
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string pxe-beacon default
d-i passwd/username string pxe
d-i passwd/user-password password pxe
d-i passwd/user-password-again password pxe
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

### Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

### Partitioning — multi-disk safety via early_command. Picks the
### FIRST disk that's at least 8 GB AND isn't a removable USB stick.
### Without this guard, an inserted USB stick on /dev/sda would get
### nuked during install.
d-i partman/early_command string \
  DISK=$(lsblk -dn -o NAME,SIZE,RM,TYPE | awk '$3=="0" && $4=="disk" && $2 ~ /^[0-9.]+G/ && $2+0 >= 8 {print "/dev/"$1; exit}'); \
  if [ -z "$DISK" ]; then DISK=/dev/sda; fi; \
  debconf-set partman-auto/disk "$DISK"; \
  debconf-set grub-installer/bootdev "$DISK"

d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### UEFI hardening: make the install boot reliably on AMI boards
### where NVRAM gets wiped or the boot order is fragile. The "extra
### removable" hack installs /EFI/BOOT/BOOTX64.EFI as a fallback so
### the box boots even with empty NVRAM.
d-i partman-efi/non_efi_system boolean true
d-i grub-installer/force-efi-extra-removable boolean true

### Base + packages
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server cloud-init ca-certificates curl wget
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

### Bootloader (target disk set by partman/early_command above)
d-i grub-installer/only_debian boolean true

### Finish — no prompt, just reboot
d-i finish-install/reboot_in_progress note

### v0.6.0: late_command — runs in /target right before the first
### reboot. When pxe-beacon was started with -client-netmask, the
### installed system needs to reach pxe-beacon at {{.AdvertisedIP}}
### for cloud-init phone_home. The system's DHCP gives a /24, but
### pxe-beacon sits on the wider {{.WiderNetworkCIDR}}. We install a
### systemd one-shot that adds a link-scope route to the wider
### network on every boot — same trick as iPXE's netmask widening,
### but at the Linux routing layer instead of iPXE's stack.
{{- if .WiderNetworkCIDR }}
d-i preseed/late_command string \
  printf '%s\n' '#!/bin/sh' 'set -e' 'IFACE=$(ip -o -4 route show default | awk "{print \$5; exit}")' '[ -n "$IFACE" ] || exit 0' 'ip route replace {{.WiderNetworkCIDR}} dev "$IFACE" scope link 2>/dev/null || true' > /target/usr/local/sbin/pxe-beacon-route; \
  chmod 755 /target/usr/local/sbin/pxe-beacon-route; \
  printf '%s\n' '[Unit]' 'Description=pxe-beacon link-scope route to {{.WiderNetworkCIDR}}' 'After=network-online.target' 'Wants=network-online.target' '' '[Service]' 'Type=oneshot' 'ExecStart=/usr/local/sbin/pxe-beacon-route' 'RemainAfterExit=yes' '' '[Install]' 'WantedBy=multi-user.target' > /target/etc/systemd/system/pxe-beacon-route.service; \
  in-target systemctl enable pxe-beacon-route.service
{{- end }}
