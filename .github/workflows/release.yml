name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed by `gh release create` to publish
  packages: write  # needed to push the container image to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # so `git describe` in the Makefile sees tags

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: test
        run: go test ./...

      - name: cross-compile
        # `make cross` builds linux/amd64, linux/arm64, darwin/arm64
        # under dist/ with -ldflags -X main.version=$(git describe ...),
        # so the binary self-reports the tag at runtime.
        run: make cross

      - name: checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "pxe-beacon ${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*

  # v0.10.0: multi-arch container image to GHCR. Runs in parallel with
  # the binary release; both are tag-triggered.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3      # arm64 emulation
      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
