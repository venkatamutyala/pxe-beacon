name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::files need gofmt:"; echo "$out"; exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - name: host build
        run: go build ./...

  cross-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      # PLAN acceptance criterion: linux/amd64, linux/arm64, darwin/arm64
      # all cross-compile. Verify on every PR so a broken release tag
      # surfaces at PR time, not at tag-push time.
      - name: make cross
        run: make cross
